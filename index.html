<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATHI OS</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="login-box">

<h1>MATHI OS 💜</h1>

<p>Windows 11 Personal AI</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Unlock

</button>

<p id="error"></p>

</div>

</div>

<!-- DESKTOP -->

<div id="desktop" class="hidden">

<!-- Desktop Icons -->

<div class="desktop-icons">

<div class="icon">

<i class="fa-solid fa-robot"></i>

<span>AI</span>

</div>

<div class="icon">

<i class="fa-solid fa-note-sticky"></i>

<span>Notes</span>

</div>

<div class="icon">

<i class="fa-solid fa-folder"></i>

<span>Files</span>

</div>

<div class="icon">

<i class="fa-solid fa-camera"></i>

<span>Camera</span>

</div>

<div class="icon">

<i class="fa-solid fa-calculator"></i>

<span>Calculator</span>

</div>

<div class="icon">

<i class="fa-solid fa-gear"></i>

<span>Settings</span>

</div>

</div>

<!-- TASKBAR -->

<div class="taskbar">

<div class="taskbar-left">

<button id="startBtn">

<i class="fa-brands fa-windows"></i>

</button>

<input
type="text"
placeholder="Search">

</div>

<div class="taskbar-right">

<span id="clock">

00:00

</span>

</div>

</div>

<!-- START MENU -->

<div
id="startMenu"
class="start-menu hidden">

<h2>

MATHI OS

</h2>

<button>

🤖 AI

</button>

<button>

📝 Notes

</button>

<button>

📁 Files

</button>

<button>

📷 Camera

</button>

<button>

🧮 Calculator

</button>

<button>

⚙ Settings

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
