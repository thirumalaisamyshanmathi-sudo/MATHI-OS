<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MATHI OS v2.0</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- ========================= -->
<!-- Boot Screen -->
<!-- ========================= -->

<div id="bootScreen">

    <div class="boot-content">

        <div class="boot-logo">

            🤖

        </div>

        <h1>MATHI OS</h1>

        <p>Powered by MATHI AI</p>

        <div class="loader">

            <div></div>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- Main App -->
<!-- ========================= -->

<div id="app" class="hidden">

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

🤖 MATHI AI

</div>

<button id="newChat">

<i class="fa-solid fa-plus"></i>

New Chat

</button>

<div class="search">

<i class="fa-solid fa-magnifying-glass"></i>

<input

type="text"

placeholder="Search Chats"

id="searchChat"

>

</div>

<h3>

Recent Chats

</h3>

<div

id="chatHistory"

>

<!-- Auto Generated -->

</div>

</div>

<!-- ========================= -->
<!-- Chat Area -->
<!-- ========================= -->

<div class="chat-container">

<div class="topbar">

<div class="title">

MATHI AI

</div>

<div class="top-icons">

<i class="fa-solid fa-bell"></i>

<i class="fa-solid fa-gear"></i>

</div>

</div>

<div

id="chatBox"

class="chat-box"

>

<div class="ai-message">

👋 Welcome Shanmathi!

I'm MATHI AI.

Start your first conversation.

</div>

</div>

<!-- Input Area -->

<div class="input-area">

<button id="emojiBtn">

😊

</button>

<button id="attachBtn">

<i class="fa-solid fa-paperclip"></i>

</button>

<button id="imageBtn">

<i class="fa-solid fa-image"></i>

</button>

<button id="cameraBtn">

<i class="fa-solid fa-camera"></i>

</button>

<button id="voiceBtn">
    <i class="fa-solid fa-microphone"></i>
</button>

<div id="emojiPanel" class="emoji-panel hidden">
    <span>😀</span>
    <span>😁</span>
    <span>😂</span>
    <span>🤣</span>
    <span>😊</span>
    <span>😍</span>
    <span>🥰</span>
    <span>😘</span>
    <span>😎</span>
    <span>🤖</span>
    <span>❤️</span>
    <span>💜</span>
    <span>💕</span>
    <span>🔥</span>
    <span>✨</span>
    <span>🌙</span>
    <span>⭐</span>
    <span>👍</span>
    <span>👏</span>
    <span>🙏</span>
</div>

<input
    type="text"
    id="messageInput"
    placeholder="Ask MATHI AI anything..."
    autocomplete="off"
>

<button id="sendBtn">
    <i class="fa-solid fa-paper-plane"></i>
</button>
<!-- Hidden File Picker -->

<input
type="file"
id="fileInput"
hidden
multiple
>

<!-- Hidden Image Picker -->

<input
type="file"
id="imageInput"
accept="image/*"
hidden
multiple
>

<!-- Hidden Camera -->

<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
hidden
>

</div>

<!-- ========================= -->
<!-- Settings Panel -->
<!-- ========================= -->

<div id="settingsPanel" class="settings-panel hidden">

<h2>

⚙️ Settings

</h2>

<div class="setting-item">

<label>

Theme

</label>

<select id="themeSelect">

<option value="purple">

Purple Aurora

</option>

<option value="blue">

Blue Ocean

</option>

<option value="light">

Light Glass

</option>

</select>

</div>

<div class="setting-item">

<label>

Wallpaper

</label>

<button id="changeWallpaper">

Change Wallpaper

</button>

</div>

<div class="setting-item">

<label>

Username

</label>

<input
type="text"
id="username"
placeholder="Shanmathi">

</div>

<button id="saveSettings">

Save

</button>

</div>

<!-- ========================= -->
<!-- Notification -->
<!-- ========================= -->

<div
id="toast"
class="toast hidden"
>

Saved Successfully

</div>

</div>

<script src="script.js"></script>

</body>

</html>
