<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATHI OS</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="login-box">

<h1>MATHI OS 💜</h1>

<p>Windows 11 Personal AI</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Unlock

</button>

<p id="error"></p>

</div>

</div>

<!-- DESKTOP -->

<div id="desktop" class="hidden">

<!-- Desktop Icons -->

<div class="desktop-icons">

<div class="icon">

<i class="fa-solid fa-robot"></i>

<span>AI</span>

</div>

<div class="icon" onclick="openWindow('notesWindow')">

<i class="fa-solid fa-note-sticky"></i>

<span>Notes</span>

</div>

<div class="icon" onclick="openWindow('filesWindow')">

<i class="fa-solid fa-folder"></i>

<span>Files</span>

</div>

<div class="icon" onclick="openCamera()">

<i class="fa-solid fa-camera"></i>

<span>Camera</span>

</div>

<div class="icon">

<i class="fa-solid fa-calculator"></i>

<span>Calculator</span>

</div>

<div class="icon">

<i class="fa-solid fa-gear"></i>

<span>Settings</span>

</div>

</div>

<!-- TASKBAR -->

<div class="taskbar">

<div class="taskbar-left">

<button id="startBtn">

<i class="fa-brands fa-windows"></i>

</button>

<input
type="text"
placeholder="Search">

</div>

<div class="taskbar-right">

<span id="clock">

00:00

</span>

</div>

</div>

<!-- START MENU -->

<div
id="startMenu"
class="start-menu hidden">

<h2>

MATHI OS

</h2>

<button>

🤖 AI

</button>

<button onclick="openWindow('notesWindow')">

📝 Notes

</button>
    
<button onclick="openWindow('filesWindow')">
     
📁 Files

</button>

<button>

📷 Camera

</button>

<button>

🧮 Calculator

</button>

<button>

⚙ Settings

</button>

</div>
<!-- Notes Window -->

<div id="notesWindow" class="window hidden">

    <div class="window-header">

        <span>📝 Notes</span>

        <button onclick="closeWindow('notesWindow')">

            ✖

        </button>

    </div>

    <textarea
        id="notesText"
        placeholder="Write your notes here..."></textarea>

    <button
        class="save-btn"
        onclick="saveNotes()">

        Save Notes

    </button>

</div>
<!-- File Explorer -->

<div id="filesWindow" class="window hidden">

    <div class="window-header">

        <span>📁 File Explorer</span>

        <button onclick="closeWindow('filesWindow')">✖</button>

    </div>

    <div class="file-list">

        <div class="folder">📁 Documents</div>

        <div class="folder">🖼️ Photos</div>

        <div class="folder">🎵 Music</div>

        <div class="folder">🎬 Videos</div>

        <div class="folder">⬇️ Downloads</div>

    </div>

</div>
<!-- Camera Window -->

<div id="cameraWindow" class="window hidden">

    <div class="window-header">

        <span>📷 Camera</span>

        <button onclick="closeWindow('cameraWindow')">✖</button>

    </div>

    <div class="camera-body">

        <video
            id="camera"
            autoplay
            playsinline>
        </video>

        <canvas
            id="canvas"
            style="display:none;">
        </canvas>

        <button
            class="save-btn"
            onclick="capturePhoto()">

            📸 Capture Photo

        </button>

    </div>

</div>    
</div>

<script src="script.js"></script>

</body>
</html>
